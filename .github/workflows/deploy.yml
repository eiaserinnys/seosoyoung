name: Deploy to Linode

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_BASE: /home/eias/services/seosoyoung
  KEEP_RELEASES: 5
  COGITO_PATH: /home/eias/seosoyoung-workspace/.projects/cogito/python

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LINODE_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.LINODE_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy seosoyoung
        run: |
          SSH_CMD="ssh -i ~/.ssh/id_ed25519 ${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}"
          SCP_CMD="scp -i ~/.ssh/id_ed25519"
          RSYNC_SSH="ssh -i ~/.ssh/id_ed25519"
          RELEASE_NAME=$(date +%Y-%m-%d-%H%M%S)
          RELEASE_DIR="${DEPLOY_BASE}/releases/${RELEASE_NAME}"

          echo "=== 1. 릴리즈 디렉토리 생성 ==="
          $SSH_CMD "mkdir -p ${RELEASE_DIR}"

          echo "=== 2. 소스 파일 동기화 ==="
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.venv' \
            --exclude='.env' \
            --exclude='.env.example' \
            -e "$RSYNC_SSH" \
            ./ ${{ secrets.LINODE_USER }}@${{ secrets.LINODE_HOST }}:${RELEASE_DIR}/

          echo "=== 3. venv 생성 및 의존성 설치 ==="
          $SSH_CMD "cd ${RELEASE_DIR} && \
            python3 -m venv .venv && \
            source .venv/bin/activate && \
            pip install --upgrade pip -q && \
            grep -v '^-e' requirements.txt | pip install -r /dev/stdin -q && \
            pip install -e ${COGITO_PATH} -q"

          echo "=== 4. shared 리소스 심볼릭 링크 ==="
          $SSH_CMD "ln -sf ${DEPLOY_BASE}/shared/.env ${RELEASE_DIR}/.env && \
            ln -sf ${DEPLOY_BASE}/shared/logs ${RELEASE_DIR}/logs && \
            ln -sf ${DEPLOY_BASE}/shared/memory ${RELEASE_DIR}/memory && \
            ln -sf ${DEPLOY_BASE}/shared/sessions ${RELEASE_DIR}/sessions && \
            mkdir -p ${RELEASE_DIR}/data"

          echo "=== 5. current 심볼릭 링크 전환 ==="
          $SSH_CMD "ln -sfn ${RELEASE_DIR} ${DEPLOY_BASE}/current"

          echo "=== 6. 서비스 재시작 (PM2) ==="
          $SSH_CMD "pm2 restart seosoyoung"

          sleep 3

          echo "=== 7. 서비스 상태 확인 ==="
          $SSH_CMD "pm2 show seosoyoung | head -20" || true

          echo "=== 8. 오래된 릴리즈 정리 ==="
          $SSH_CMD "cd ${DEPLOY_BASE}/releases && ls -t | tail -n +\$((${KEEP_RELEASES} + 1)) | xargs -r rm -rf"

      - name: 📢 Discord 알림 (배포 성공)
        if: success()
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"✅ 배포 완료\", \"description\": \"**seosoyoung** 배포가 성공적으로 완료되었습니다.\", \"color\": 5763719, \"fields\": [{\"name\": \"브랜치\", \"value\": \"\`${{ github.ref_name }}\`\", \"inline\": true}, {\"name\": \"커밋\", \"value\": \"[\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\", \"inline\": true}], \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }} || true

      - name: 📢 Discord 알림 (배포 실패)
        if: failure()
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"❌ 배포 실패\", \"description\": \"**seosoyoung** 배포가 실패했습니다.\", \"color\": 15548997, \"fields\": [{\"name\": \"브랜치\", \"value\": \"\`${{ github.ref_name }}\`\", \"inline\": true}, {\"name\": \"커밋\", \"value\": \"[\`${GITHUB_SHA::7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\", \"inline\": true}, {\"name\": \"워크플로우\", \"value\": \"[로그 보기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true}], \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}" \
            ${{ secrets.DISCORD_WEBHOOK_URL }} || true
